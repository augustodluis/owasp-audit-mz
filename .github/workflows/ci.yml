name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ["8.2", "8.3"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: owasp_audit_mz_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, openssl, tokenizer, xml, json, curl, fileinfo, dom, bcmath
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate
          php -r "
            \$env = file_get_contents('.env');
            \$env = preg_replace('/^DB_HOST=.*/m', 'DB_HOST=127.0.0.1', \$env);
            \$env = preg_replace('/^DB_PORT=.*/m', 'DB_PORT=3306', \$env);
            \$env = preg_replace('/^DB_DATABASE=.*/m', 'DB_DATABASE=owasp_audit_mz_ci', \$env);
            \$env = preg_replace('/^DB_USERNAME=.*/m', 'DB_USERNAME=root', \$env);
            \$env = preg_replace('/^DB_PASSWORD=.*/m', 'DB_PASSWORD=', \$env);
            file_put_contents('.env', \$env);
          "

      - name: PHP syntax check
        run: |
          set -e
          find app config database routes -name "*.php" -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Run Pint (suggest formatting)
        continue-on-error: true
        run: ./vendor/bin/pint --test || true

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot --silent; then
              echo "MySQL is up"
              break
            fi
            sleep 2
          done

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: owasp_audit_mz_ci
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: php artisan migrate --force

      - name: Smoke test, boot Laravel
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: owasp_audit_mz_ci
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: php artisan route:list

  security-audit:
    name: Composer security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
      - name: Composer install
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Audit dependencies
        continue-on-error: true
        run: composer audit
